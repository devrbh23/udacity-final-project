<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Munder Difflin Multi-Agent System Workflow</title>
<desc>Flowchart showing the 4-agent pipeline: customer request flows through Inventory Agent, Quote Agent, Order Agent, and Orchestrator, each with their own tools connected to a SQLite database.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; fill: #222; }
    .th  { font-size: 14px; font-weight: 600; }
    .ts  { font-size: 12px; font-weight: 400; fill: #555; }
    .arr { stroke: #888; stroke-width: 1.5; fill: none; }
    .teal-box  { fill: #E1F5EE; stroke: #0F6E56; }
    .purple-box{ fill: #EEEDFE; stroke: #534AB7; }
    .amber-box { fill: #FAEEDA; stroke: #854F0B; }
    .coral-box { fill: #FAECE7; stroke: #993C1D; }
    .gray-box  { fill: #F1EFE8; stroke: #5F5E5A; }
    .blue-box  { fill: #E6F1FB; stroke: #185FA5; }
    .tool-teal  { fill: #9FE1CB; stroke: #0F6E56; }
    .tool-purple{ fill: #CECBF6; stroke: #534AB7; }
    .tool-amber { fill: #FAC775; stroke: #854F0B; }
  </style>
</defs>

<!-- Background lane -->
<rect x="20" y="100" width="640" height="660" rx="12" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="6 4"/>
<text class="ts" x="36" y="120">Agent pipeline</text>

<!-- CUSTOMER REQUEST -->
<rect class="gray-box" x="215" y="30" width="250" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central">Customer request</text>
<text class="ts" x="340" y="67" text-anchor="middle" dominant-baseline="central">Text with date + items needed</text>

<line x1="340" y1="78" x2="340" y2="112" class="arr" marker-end="url(#arrow)"/>

<!-- INVENTORY AGENT -->
<rect class="teal-box" x="170" y="112" width="340" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="134" text-anchor="middle" dominant-baseline="central">Inventory agent</text>
<text class="ts" x="340" y="152" text-anchor="middle" dominant-baseline="central">Check stock · restock if low · report availability</text>

<rect class="tool-teal" x="28" y="122" width="124" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="90" y="140" text-anchor="middle" dominant-baseline="central" style="font-size:12px">check_inventory</text>
<rect class="tool-teal" x="28" y="166" width="124" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="90" y="184" text-anchor="middle" dominant-baseline="central" style="font-size:12px">get_full_inventory</text>
<rect class="tool-teal" x="28" y="210" width="124" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="90" y="228" text-anchor="middle" dominant-baseline="central" style="font-size:12px">restock_item</text>
<line x1="152" y1="140" x2="170" y2="140" class="arr" marker-end="url(#arrow)" stroke="#aaa"/>
<line x1="152" y1="184" x2="170" y2="155" class="arr" marker-end="url(#arrow)" stroke="#aaa"/>
<line x1="152" y1="228" x2="170" y2="165" class="arr" marker-end="url(#arrow)" stroke="#aaa"/>

<line x1="340" y1="168" x2="340" y2="202" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="190">inventory summary (JSON)</text>

<!-- QUOTE AGENT -->
<rect class="purple-box" x="170" y="202" width="340" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="224" text-anchor="middle" dominant-baseline="central">Quote agent</text>
<text class="ts" x="340" y="242" text-anchor="middle" dominant-baseline="central">Price lookup · bulk discounts · itemised quote</text>

<rect class="tool-purple" x="528" y="202" width="128" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="592" y="220" text-anchor="middle" dominant-baseline="central" style="font-size:11px">lookup_past_quotes</text>
<rect class="tool-purple" x="528" y="246" width="128" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="592" y="264" text-anchor="middle" dominant-baseline="central" style="font-size:12px">get_item_price</text>
<rect class="tool-purple" x="528" y="290" width="128" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="592" y="308" text-anchor="middle" dominant-baseline="central" style="font-size:12px">get_catalogue</text>
<line x1="510" y1="220" x2="528" y2="220" class="arr" marker-end="url(#arrow)" stroke="#aaa"/>
<line x1="510" y1="245" x2="528" y2="264" class="arr" marker-end="url(#arrow)" stroke="#aaa"/>
<line x1="510" y1="255" x2="528" y2="308" class="arr" marker-end="url(#arrow)" stroke="#aaa"/>

<line x1="340" y1="258" x2="340" y2="292" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="280">quote details (JSON)</text>

<!-- ORDER AGENT -->
<rect class="amber-box" x="170" y="292" width="340" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="314" text-anchor="middle" dominant-baseline="central">Order agent</text>
<text class="ts" x="340" y="332" text-anchor="middle" dominant-baseline="central">Verify cash · process sales · record transactions</text>

<rect class="tool-amber" x="28" y="282" width="124" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="90" y="300" text-anchor="middle" dominant-baseline="central" style="font-size:12px">process_sale</text>
<rect class="tool-amber" x="28" y="326" width="124" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="90" y="344" text-anchor="middle" dominant-baseline="central" style="font-size:12px">get_cash_balance</text>
<rect class="tool-amber" x="28" y="370" width="124" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="90" y="388" text-anchor="middle" dominant-baseline="central" style="font-size:12px">supplier_lead_time</text>
<line x1="152" y1="300" x2="170" y2="310" class="arr" marker-end="url(#arrow)" stroke="#aaa"/>
<line x1="152" y1="344" x2="170" y2="330" class="arr" marker-end="url(#arrow)" stroke="#aaa"/>
<line x1="152" y1="388" x2="170" y2="345" class="arr" marker-end="url(#arrow)" stroke="#aaa"/>

<line x1="340" y1="348" x2="340" y2="382" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="370">transaction summary (JSON)</text>

<!-- ORCHESTRATOR -->
<rect class="coral-box" x="170" y="382" width="340" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="404" text-anchor="middle" dominant-baseline="central">Orchestrator</text>
<text class="ts" x="340" y="422" text-anchor="middle" dominant-baseline="central">Synthesise all results · write customer response</text>

<line x1="340" y1="438" x2="340" y2="472" class="arr" marker-end="url(#arrow)"/>

<!-- CUSTOMER RESPONSE -->
<rect class="gray-box" x="215" y="472" width="250" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="492" text-anchor="middle" dominant-baseline="central">Customer response</text>
<text class="ts" x="340" y="510" text-anchor="middle" dominant-baseline="central">Quote · delivery date · fulfillment status</text>

<!-- DATABASE -->
<rect class="blue-box" x="140" y="560" width="400" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="582" text-anchor="middle" dominant-baseline="central">SQLite database</text>
<text class="ts" x="340" y="600" text-anchor="middle" dominant-baseline="central">transactions · inventory · quotes · quote_requests</text>

<!-- DB lines -->
<line x1="290" y1="168" x2="260" y2="560" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<line x1="310" y1="258" x2="290" y2="560" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<line x1="330" y1="348" x2="320" y2="560" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<text class="ts" x="180" y="555">read/write</text>

<!-- DISCOUNT LEGEND -->
<rect x="140" y="650" width="400" height="90" rx="8" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="th" x="340" y="672" text-anchor="middle" dominant-baseline="central">Bulk discount tiers</text>
<text class="ts" x="200" y="696" text-anchor="middle">Orders &gt; $500</text>
<text class="ts" x="340" y="696" text-anchor="middle">Orders &gt; $1,000</text>
<text class="ts" x="480" y="696" text-anchor="middle">Orders &gt; $5,000</text>
<rect class="teal-box" x="158" y="706" width="80" height="26" rx="6" stroke-width="0.5"/>
<text class="th" x="198" y="719" text-anchor="middle" dominant-baseline="central">5% off</text>
<rect class="purple-box" x="300" y="706" width="80" height="26" rx="6" stroke-width="0.5"/>
<text class="th" x="340" y="719" text-anchor="middle" dominant-baseline="central">10% off</text>
<rect class="amber-box" x="440" y="706" width="80" height="26" rx="6" stroke-width="0.5"/>
<text class="th" x="480" y="719" text-anchor="middle" dominant-baseline="central">15% off</text>

</svg>
